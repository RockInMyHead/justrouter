<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#010101"/>
  <rect width="400" height="80" fill="url(#topGrad)"/>
  <rect y="220" width="400" height="80" fill="url(#botGrad)"/>
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="botGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="deco" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <text x="200" y="95" text-anchor="middle" fill="url(#deco)" font-family="system-ui,sans-serif" font-size="42" font-weight="700" letter-spacing="4">NEW ERA</text>
  <circle cx="36" cy="32" r="10" fill="#fff" opacity="0.9"/>
  <text x="54" y="36" fill="#fff" font-family="system-ui,sans-serif" font-size="11">Logoipsum</text>
  <rect x="318" y="22" width="62" height="22" rx="6" fill="#fff"/>
  <text x="349" y="37" text-anchor="middle" fill="#272835" font-family="system-ui,sans-serif" font-size="9" font-weight="600">Cart</text>
  <text x="24" y="248" fill="#fff" font-family="system-ui,sans-serif" font-size="9" opacity="0.85">Choose from thousands of certified cars...</text>
  <rect x="24" y="258" width="72" height="18" rx="5" fill="#fff"/>
  <text x="60" y="270" text-anchor="middle" fill="#272835" font-family="system-ui,sans-serif" font-size="8" font-weight="600">Shop Now</text>
  <text x="376" y="278" text-anchor="end" fill="#fff" font-family="system-ui,sans-serif" font-size="16" font-weight="700">FIND THE PERFECT CAR</text>
</svg>
